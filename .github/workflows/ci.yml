name: CineSwipe CI/CD

# Eventos que disparan el flujo de trabajo
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  # 1. Job de Linting: Verifica calidad de código y reglas de estilo
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

  # 2. Job de Tests: Ejecuta la suite de Vitest
  test:
    needs: lint # Solo corre si el lint pasó
    runs-on: ubuntu-latest
    env:
      # Definimos una API Key de prueba para que los tests no fallen pero no exponemos la real
      VITE_TMDB_KEY: test_key_placeholder
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run Tests
        run: npm run test

  # 3. Job de Build: Genera el paquete de producción si todo lo anterior está OK
  build:
    needs: [lint, test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Application
        run: npm run build

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: production-dist
          path: dist/
          retention-days: 7
